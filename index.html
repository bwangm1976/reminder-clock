<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>提醒小钟</title>
  <style>
    :root {
      --bg: #0f172a;
      --panel: rgba(15, 23, 42, 0.72);
      --line: rgba(148, 163, 184, 0.18);
      --text: #e2e8f0;
      --muted: #94a3b8;
      --accent: #38bdf8;
      --accent-2: #22c55e;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: Arial, "Microsoft YaHei", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top, rgba(56, 189, 248, 0.18), transparent 35%),
        radial-gradient(circle at bottom right, rgba(34, 197, 94, 0.14), transparent 32%),
        var(--bg);
    }

    .card {
      width: min(92vw, 420px);
      padding: 32px 28px 28px;
      border: 1px solid var(--line);
      border-radius: 20px;
      background: var(--panel);
      backdrop-filter: blur(14px);
      box-shadow: 0 24px 70px rgba(0, 0, 0, 0.32);
      text-align: center;
    }

    .clock {
      width: 150px;
      height: 150px;
      margin: 0 auto 22px;
      position: relative;
      border-radius: 50%;
      border: 8px solid rgba(56, 189, 248, 0.9);
      background:
        radial-gradient(circle at center, rgba(255, 255, 255, 0.98) 0 7px, transparent 8px),
        radial-gradient(circle at center, rgba(15, 23, 42, 0.94) 0 100%);
      box-shadow: 0 0 0 8px rgba(56, 189, 248, 0.08);
    }

    .clock::before,
    .clock::after {
      content: "";
      position: absolute;
      left: 50%;
      top: 50%;
      transform-origin: bottom center;
      border-radius: 999px;
      background: #fff;
    }

    .clock::before {
      width: 6px;
      height: 42px;
      transform: translate(-50%, -100%) rotate(28deg);
    }

    .clock::after {
      width: 4px;
      height: 56px;
      transform: translate(-50%, -100%) rotate(115deg);
      background: var(--accent);
    }

    .bell {
      position: absolute;
      top: -18px;
      left: 50%;
      width: 54px;
      height: 24px;
      transform: translateX(-50%);
      border-radius: 18px 18px 8px 8px;
      background: linear-gradient(180deg, #f8fafc, #cbd5e1);
      box-shadow: 0 2px 0 rgba(255, 255, 255, 0.35) inset;
    }

    .bell::before,
    .bell::after {
      content: "";
      position: absolute;
      bottom: -8px;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: #cbd5e1;
    }

    .bell::before { left: -6px; }
    .bell::after { right: -6px; }

    h1 {
      margin: 0;
      font-size: 34px;
      letter-spacing: 0;
    }

    p {
      margin: 12px 0 0;
      color: var(--muted);
      font-size: 16px;
      line-height: 1.7;
    }

    .tag {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-top: 18px;
      padding: 10px 16px;
      border-radius: 999px;
      background: rgba(56, 189, 248, 0.12);
      color: #bae6fd;
      font-size: 14px;
    }

    .tag i {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--accent-2);
      box-shadow: 0 0 12px rgba(34, 197, 94, 0.8);
    }
  </style>
</head>
<body>
  <main class="card">
    <div class="clock" aria-hidden="true">
      <div class="bell"></div>
    </div>
    <h1>提醒小钟</h1>
    <p>一个简单的提醒页面。<br>到点就响铃，帮你记住重要的事。</p>
    <div class="tag"><i></i>专注 · 提醒 · 准时</div>
  </main>
</body>
</html>
